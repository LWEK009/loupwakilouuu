[phases.setup]
  nixPkgs = ["php83", "php83Packages.composer", "nodejs_20"]

[phases.install]
  cmds = ["composer install", "npm install"]

[phases.build]
  cmds = [
    "npm run build",
    "touch database/database.sqlite"
  ]

[start]
  cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
